site_name: Die Ameisen von morgen
site_description: Alles, was du für wirklich hältst, ist eine Geschichte — und jetzt betritt ein neuer Geschichtenerzähler die Bühne. Ein Buch in Arbeit.
site_author: Thorsten Panneck-Conradi
site_url: https://tpanneck.github.io/ameisen-von-morgen/
repo_url: https://github.com/tpanneck/ameisen-von-morgen
repo_name: tpanneck/ameisen-von-morgen
copyright: "© Thorsten Panneck-Conradi & Claude — Manuskript in Arbeit, alle Rechte vorbehalten"

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dunkles Design
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Helles Design
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search:
      lang: de

